<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Santrix Admin</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  color:white;
  padding:50px;
}

/* Earth Background */
body::before{
  content:"";
  position:fixed;
  width:100%;height:100%;
  background:url("https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=1920") no-repeat center/cover;
  z-index:-2;
  animation:earthMove 60s linear infinite;
}

body::after{
  content:"";
  position:fixed;
  width:100%;height:100%;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

@keyframes earthMove{
  0%{transform:scale(1.1);}
  50%{transform:scale(1.15) translateY(-20px);}
  100%{transform:scale(1.1);}
}

.admin-box{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  padding:40px;
  border-radius:15px;
}

input{
  padding:10px;
  margin:10px;
  border:none;
  border-radius:6px;
}

button{
  padding:8px 15px;
  background:#00d1b2;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

.product{
  margin:10px 0;
  padding:10px;
  background:rgba(255,255,255,0.05);
  border-radius:8px;
}
</style>
</head>
<body>

<div class="admin-box">
<h2>Admin Dashboard</h2>

<h3>Add Product</h3>
<input type="text" id="name" placeholder="Product Name">
<input type="number" id="price" placeholder="Price">
<button onclick="addProduct()">Add</button>

<h3>Products</h3>
<div id="products"></div>

<br>
<button onclick="logout()">Logout</button>
</div>

<script>
const token = localStorage.getItem("token");
if(!token){ window.location.href="login.html"; }

async function loadProducts(){
  const res = await fetch("/api/products");
  const products = await res.json();
  const list = document.getElementById("products");
  list.innerHTML="";
  products.forEach(p=>{
    list.innerHTML+=`
      <div class="product">
        ${p.name} - £${p.price}
        <button onclick="deleteProduct('${p._id}')">Remove</button>
      </div>
    `;
  });
}

async function addProduct(){
  const name=document.getElementById("name").value;
  const price=document.getElementById("price").value;

  await fetch("/api/products",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({name,price})
  });

  loadProducts();
}

async function deleteProduct(id){
  await fetch("/api/products/"+id,{
    method:"DELETE",
    headers:{ "Authorization":token }
  });
  loadProducts();
}

function logout(){
  localStorage.removeItem("token");
  window.location.href="index.html";
}

loadProducts();
</script>

</body>
</html>
