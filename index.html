<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Santrix Shop</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .product { border: 1px solid #ccc; border-radius: 8px; padding: 15px; margin-bottom: 20px; max-width: 300px;}
    .product img { width: 100%; border-radius: 5px; }
    .product h3 { margin: 10px 0; }
    .product button { padding: 10px 15px; background: #00d1b2; border: none; color: #fff; cursor: pointer; border-radius: 5px; }
    .product button:hover { background: #00b89c; }
  </style>
</head>
<body>
  <h1>Santrix Products</h1>
  <div class="product">
    <img src="https://source.unsplash.com/300x200/?technology,gadget" alt="Product 1">
    <h3>Product 1</h3>
    <p>Awesome tech product description.</p>
    <button>Add to Cart</button>
  </div>
  <div class="product">
    <img src="https://source.unsplash.com/300x200/?technology,gadget" alt="Product 2">
    <h3>Product 2</h3>
    <p>Another amazing product description.</p>
    <button>Add to Cart</button>
  </div>
</body>
</html>
