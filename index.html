<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Santrix</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6f9;}
header{background:#0d1117;color:white;text-align:center;padding:20px;}
nav a{color:white;margin:0 15px;text-decoration:none;}
section{padding:60px 20px;text-align:center;}
.products{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
.product{background:white;padding:20px;border-radius:10px;width:250px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
button{padding:8px 12px;background:#00d1b2;border:none;color:white;border-radius:5px;cursor:pointer;}
footer{background:#0d1117;color:white;text-align:center;padding:20px;margin-top:40px;}
</style>
</head>
<body>

<header>
<h1>Santrix</h1>
<nav>
<a href="#shop">Shop</a>
<a href="login.html">Login</a>
</nav>
</header>

<section id="shop">
<h2>Santrix Store</h2>
<div class="products" id="product-list"></div>
</section>

<footer>© 2026 Santrix</footer>

<script>
function loadProducts(){
  const list=document.getElementById("product-list");
  list.innerHTML="";
  let products=JSON.parse(localStorage.getItem("santrix_products")) || [];
  products.forEach((p,index)=>{
    list.innerHTML+=`
      <div class="product">
        <h3>${p.name}</h3>
        <p>£${p.price}</p>
      </div>
    `;
  });
}
loadProducts();
</script>

</body>
</html>
